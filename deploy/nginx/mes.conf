# Nginx 是生产环境唯一对公网暴露的入口：提供 Vue 静态文件，并把 /api 反向代理给本机 Java 8080。
server {
    # 公网 HTTP 端口和当前腾讯云服务器 IP；绑定域名后可替换 server_name 并增加 HTTPS server 块。
    listen 80;
    server_name 119.45.196.92;

    # npm run build 生成的 Vite 静态目录。
    root /www/wwwroot/mes/frontend/dist;
    index index.html;

    access_log /www/wwwlogs/mes-access.log;
    error_log /www/wwwlogs/mes-error.log;

    # REST 接口不由 Nginx处理业务，完整转发给只监听 127.0.0.1 的内嵌 Tomcat/Jersey。
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        # 保留原始 Host、客户端 IP 和协议，供审计日志、公开 URL 或后续安全策略使用。
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Vue Router 使用 history 模式：真实静态文件不存在时回退 index.html，由前端路由接管。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 带 hash 的前端资源可安全缓存；不存在的资源直接 404，不回退 HTML。
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # 禁止通过 Web 读取 .env、.git 等隐藏文件。
    location ~ /\. {
        deny all;
    }
}
