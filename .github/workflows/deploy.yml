name: Deploy MES

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          zip -r mes.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "MES System/target/*" \
            -x "mes.zip"

      - name: Upload package to server
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" scp -o StrictHostKeyChecking=no mes.zip "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/mes.zip"

      - name: Deploy on server
        run: |
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh -o StrictHostKeyChecking=no "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "sudo /www/wwwroot/deploy-mes.sh"
