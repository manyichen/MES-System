<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>双星轮胎质量追溯</title>
    <link rel="icon" href="assets/mes-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/trace-public.css">
</head>
<body>
    <main class="trace-mobile">
        <header class="trace-brand"><img src="assets/mes-icon.svg" alt=""><div><strong>双星轮胎</strong><span>单胎质量追溯</span></div><i>官方追溯</i></header>
        <section class="trace-hero"><span class="verify-mark">✓</span><p>产品追溯状态</p><h1 id="public-status">正在核验二维码</h1><small id="public-hint">正在从制造执行系统读取信息…</small></section>
        <section id="public-content" class="trace-card loading"><div class="loading-ring"></div></section>
        <section class="trace-notice"><strong>信息说明</strong><p>本页面数据由双星轮胎制造执行系统生成。每个二维码仅对应一条轮胎，请核对轮胎序列号与标签是否一致。</p></section>
        <footer>双星轮胎制造执行系统 · 质量数据可追溯</footer>
    </main>
    <script src="js/trace-public.js"></script>
</body>
</html>
